{% extends "admin/change_list.html" %}
{% block content %}
  <h2>Today's Page Views (Google Analytics)</h2>
  <canvas id="pageViewsChart" width="800" height="300"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Use JSON.parse to safely handle Django context variables
    const labels = JSON.parse('{{ labels|escapejs }}');
    const views = JSON.parse('{{ views|escapejs }}');

    const data = {
      labels: labels,
      datasets: [{
        label: 'Page Views',
        data: views,
        backgroundColor: 'rgba(54, 162, 235, 0.2)',
        borderColor: 'rgba(54, 162, 235, 1)',
        borderWidth: 2
      }]
    };

    new Chart(document.getElementById('pageViewsChart'), {
      type: 'bar',
      data: data,
      options: {
        scales: {
          y: {
            beginAtZero: true,
            ticks: { precision: 0 }
          }
        }
      }
    });
  </script>
  <hr>
  {{ block.super }}
{% endblock %}
