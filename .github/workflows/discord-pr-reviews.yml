name: Discord — PR Reviews

on:
  pull_request:
    types:
      - opened          # new PR created
      - review_requested # someone was asked to review
      - ready_for_review # draft PR marked ready

jobs:
  notify:
    # Skip draft opens; ready_for_review fires when the PR becomes reviewable
    if: github.event.action != 'opened' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Build message payload
        id: payload
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_REPO: ${{ github.repository }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REQUESTED_REVIEWER: ${{ github.event.requested_reviewer.login }}
          REQUESTED_TEAM: ${{ github.event.requested_team.slug }}
        run: |
          case "${{ github.event.action }}" in
            opened)
              EMOJI="🟢"
              TITLE="New PR opened"
              COLOR=3066993
              ;;
            review_requested)
              EMOJI="👀"
              TITLE="Review requested"
              COLOR=16776960
              ;;
            ready_for_review)
              EMOJI="✅"
              TITLE="PR ready for review"
              COLOR=5763719
              ;;
          esac

          REVIEWER_LINE=""
          if [ -n "$REQUESTED_REVIEWER" ]; then
            REVIEWER_LINE="**Reviewer:** @${REQUESTED_REVIEWER}"
          elif [ -n "$REQUESTED_TEAM" ]; then
            REVIEWER_LINE="**Team:** @${REQUESTED_TEAM}"
          fi

          jq -n \
            --arg title "${EMOJI} ${TITLE}" \
            --arg pr_title "$PR_TITLE" \
            --arg reviewer_line "$REVIEWER_LINE" \
            --arg url "$PR_URL" \
            --argjson color "$COLOR" \
            --arg repo "$PR_REPO" \
            --arg author "$PR_AUTHOR" \
            --arg head "$PR_HEAD" \
            --arg base "$PR_BASE" \
            --arg footer "PR #${PR_NUMBER}" \
            '
              ($pr_title | "**" + . + "**") as $base_desc |
              (if $reviewer_line != "" then $base_desc + "\n" + $reviewer_line else $base_desc end) as $description |
              {
              embeds: [{
                title: $title,
                description: $description,
                url: $url,
                color: $color,
                fields: [
                  {name: "Repo", value: $repo, inline: true},
                  {name: "Author", value: ("@" + $author), inline: true},
                  {name: "Branch", value: ("`" + $head + "` → `" + $base + "`"), inline: false}
                ],
                footer: {text: $footer}
              }]
            }' > /tmp/discord_payload.json

      - name: Post to Discord #pr-reviews
        run: |
          curl --fail -sS -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            "${{ secrets.DISCORD_PR_REVIEWS_WEBHOOK }}"
