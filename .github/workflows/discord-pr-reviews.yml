name: Discord — PR Reviews

on:
  pull_request:
    types:
      - opened          # new PR created
      - review_requested # someone was asked to review
      - ready_for_review # draft PR marked ready

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message payload
        id: payload
        run: |
          # Pick an emoji based on the event type
          case "${{ github.event.action }}" in
            opened)
              EMOJI="🟢"
              TITLE="New PR opened"
              COLOR=3066993
              ;;
            review_requested)
              EMOJI="👀"
              TITLE="Review requested"
              COLOR=16776960
              ;;
            ready_for_review)
              EMOJI="✅"
              TITLE="PR ready for review"
              COLOR=5763719
              ;;
          esac

          # Who was requested to review (only set on review_requested)
          REVIEWER="${{ github.event.requested_reviewer.login }}"
          REVIEWER_LINE=""
          if [ -n "$REVIEWER" ]; then
            REVIEWER_LINE="**Reviewer:** @${REVIEWER}"
          fi

          # Write the JSON payload to a file to avoid shell-escaping issues
          cat > /tmp/discord_payload.json << EOF
          {
            "embeds": [{
              "title": "${EMOJI} ${TITLE}",
              "description": "**${{ github.event.pull_request.title }}**\n${REVIEWER_LINE}",
              "url": "${{ github.event.pull_request.html_url }}",
              "color": ${COLOR},
              "fields": [
                {
                  "name": "Repo",
                  "value": "${{ github.repository }}",
                  "inline": true
                },
                {
                  "name": "Author",
                  "value": "@${{ github.event.pull_request.user.login }}",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "\`${{ github.event.pull_request.head.ref }}\` → \`${{ github.event.pull_request.base.ref }}\`",
                  "inline": false
                }
              ],
              "footer": {
                "text": "PR #${{ github.event.pull_request.number }}"
              }
            }]
          }
          EOF

      - name: Post to Discord #pr-reviews
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            "${{ secrets.DISCORD_PR_REVIEWS_WEBHOOK }}"
