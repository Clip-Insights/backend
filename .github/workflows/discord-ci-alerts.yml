name: Discord — CI Alerts

on:
  workflow_run:
    workflows: ["*"]   # watches ALL your other workflows
    types:
      - completed       # only fires when a run finishes

jobs:
  notify-on-failure:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name != 'Discord — CI Alerts'
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Discord #ci-alerts
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.workflow_run.triggering_actor.login }}
        run: |
          jq -n \
            --arg workflow_name "$WORKFLOW_NAME" \
            --arg branch "$HEAD_BRANCH" \
            --arg sha "$HEAD_SHA" \
            --arg url "$RUN_URL" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            '
              ("🔴 CI Failed — " + $workflow_name) as $title |
              ("A workflow failed on **`" + $branch + "`**.\nCommit: `" + $sha + "`") as $description |
              {
                embeds: [{
                  title: $title,
                  description: $description,
                  url: $url,
                  color: 15158332,
                  fields: [
                    {name: "Repo", value: $repo, inline: true},
                    {name: "Triggered by", value: ("@" + $actor), inline: true},
                    {name: "Branch", value: ("`" + $branch + "`"), inline: true}
                  ],
                  footer: {text: "Click the title to see the failing logs"}
                }]
              }
            ' > /tmp/discord_payload.json

          curl --fail -sS -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            "${{ secrets.DISCORD_CI_ALERTS_WEBHOOK }}"
