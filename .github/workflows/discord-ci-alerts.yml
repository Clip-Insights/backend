name: Discord — CI Alerts

on:
  workflow_run:
    workflows: ["*"]   # watches ALL your other workflows
    types:
      - completed       # only fires when a run finishes

jobs:
  notify-on-failure:
    # Only run this job if the watched workflow actually failed
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Discord #ci-alerts
        run: |
          cat > /tmp/discord_payload.json << EOF
          {
            "embeds": [{
              "title": "🔴 CI Failed — ${{ github.event.workflow_run.name }}",
              "description": "A workflow failed on **\`${{ github.event.workflow_run.head_branch }}\`**.\nCommit: \`${{ github.event.workflow_run.head_sha }}\`",
              "url": "${{ github.event.workflow_run.html_url }}",
              "color": 15158332,
              "fields": [
                {
                  "name": "Repo",
                  "value": "${{ github.repository }}",
                  "inline": true
                },
                {
                  "name": "Triggered by",
                  "value": "@${{ github.event.workflow_run.triggering_actor.login }}",
                  "inline": true
                },
                {
                  "name": "Branch",
                  "value": "\`${{ github.event.workflow_run.head_branch }}\`",
                  "inline": true
                }
              ],
              "footer": {
                "text": "Click the title to see the failing logs"
              }
            }]
          }
          EOF

          curl -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            "${{ secrets.DISCORD_CI_ALERTS_WEBHOOK }}"
