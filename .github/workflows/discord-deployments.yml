name: Discord — Deployments

on:
  push:
    branches:
      - main      # adjust to your production branch name
      - staging   # remove this line if you don't have a staging branch

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "label=Production 🚀" >> $GITHUB_OUTPUT
            echo "color=5763719" >> $GITHUB_OUTPUT   # green
          else
            echo "label=Staging 🔧" >> $GITHUB_OUTPUT
            echo "color=16776960" >> $GITHUB_OUTPUT  # yellow
          fi

      - name: Post to Discord #deployments
        env:
          ENV_LABEL: ${{ steps.env.outputs.label }}
          ENV_COLOR: ${{ steps.env.outputs.color }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        run: |
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          jq -n \
            --arg env_label "$ENV_LABEL" \
            --arg message "$COMMIT_MSG" \
            --arg url "$COMMIT_URL" \
            --argjson color "$ENV_COLOR" \
            --arg repo "$REPO" \
            --arg actor "$ACTOR" \
            --arg short_sha "$SHORT_SHA" \
            --arg branch "$BRANCH" \
            '
              ("📦 Deploy pushed — " + $env_label) as $title |
              {
                embeds: [{
                  title: $title,
                  description: $message,
                  url: $url,
                  color: $color,
                  fields: [
                    {name: "Repo", value: $repo, inline: true},
                    {name: "Pushed by", value: ("@" + $actor), inline: true},
                    {name: "Commit", value: ("[`" + $short_sha + "`](" + $url + ")"), inline: true}
                  ],
                  footer: {text: ("Branch: " + $branch)}
                }]
              }
            ' > /tmp/discord_payload.json

          curl --fail -sS -X POST \
            -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            "${{ secrets.DISCORD_DEPLOYMENTS_WEBHOOK }}"
